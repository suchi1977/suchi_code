<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0f172a;
    color: white;
    overflow-x: hidden;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    position: fixed;
    width: 100%;
    z-index: 1000;
}

nav h1 {
    color: #38bdf8;
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-around;
}

.hero img {
    width: 400px;
    border-radius: 20px;
}

.hero-text h2 {
    font-size: 40px;
}

/* BUTTON HOVER EFFECT */
.btn {
    margin-top: 20px;
    padding: 12px 30px;
    border: none;
    background: linear-gradient(45deg, #38bdf8, #6366f1);
    color: white;
    cursor: pointer;
    border-radius: 30px;
    transition: 0.4s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #38bdf8;
}

/* CAROUSEL */
.carousel {
    perspective: 1000px;
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.carousel-container {
    width: 300px;
    height: 200px;
    position: relative;
    transform-style: preserve-3d;
    animation: rotate 15s infinite linear;
}

.carousel-item {
    position: absolute;
    width: 300px;
    height: 200px;
}

.carousel-item img {
    width: 100%;
    height: 100%;
    border-radius: 15px;
}

.carousel-item:nth-child(1) { transform: rotateY(0deg) translateZ(400px); }
.carousel-item:nth-child(2) { transform: rotateY(60deg) translateZ(400px); }
.carousel-item:nth-child(3) { transform: rotateY(120deg) translateZ(400px); }
.carousel-item:nth-child(4) { transform: rotateY(180deg) translateZ(400px); }
.carousel-item:nth-child(5) { transform: rotateY(240deg) translateZ(400px); }
.carousel-item:nth-child(6) { transform: rotateY(300deg) translateZ(400px); }

@keyframes rotate {
    from { transform: rotateY(0); }
    to { transform: rotateY(360deg); }
}

/* PROJECTS */
.projects {
    padding: 80px;
    text-align: center;
}

.project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px #38bdf8;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* VIDEO SECTION */
.video-section {
    padding: 80px;
    text-align: center;
}

.video-section video {
    width: 80%;
    border-radius: 20px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    background: #020617;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <h1>MyPortfolio</h1>
    <div>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
        <h2>Hello, I'm Developer</h2>
        <p>Creative Web Designer & Developer</p>
        <button class="btn">Hire Me</button>
    </div>
    <img src="https://source.unsplash.com/400x400/?developer">
</section>

<!-- CAROUSEL -->
<section class="carousel">
    <div class="carousel-container">
        <div class="carousel-item"><img src="https://source.unsplash.com/300x200/?website"></div>
        <div class="carousel-item"><img src="https://source.unsplash.com/300x200/?coding"></div>
        <div class="carousel-item"><img src="https://source.unsplash.com/300x200/?ui"></div>
        <div class="carousel-item"><img src="https://source.unsplash.com/300x200/?app"></div>
        <div class="carousel-item"><img src="https://source.unsplash.com/300x200/?design"></div>
        <div class="carousel-item"><img src="https://source.unsplash.com/300x200/?technology"></div>
    </div>
</section>

<!-- PROJECTS -->
<section class="projects">
    <h2>My Projects</h2>
    <div class="project-grid">
        <div class="card">
            <img src="https://source.unsplash.com/300x200/?portfolio">
            <h3>Portfolio Website</h3>
        </div>
        <div class="card">
            <img src="https://source.unsplash.com/300x200/?dashboard">
            <h3>Dashboard UI</h3>
        </div>
        <div class="card">
            <img src="https://source.unsplash.com/300x200/?mobile">
            <h3>Mobile App</h3>
        </div>
    </div>
</section>

<!-- VIDEO -->
<section class="video-section">
    <h2>My Work Demo</h2>
    <video controls>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 My Portfolio</p>
</footer>

<script>
// Optional JS for interaction (pause carousel on hover)
const carousel = document.querySelector('.carousel-container');

carousel.addEventListener('mouseenter', () => {
    carousel.style.animationPlayState = 'paused';
});

carousel.addEventListener('mouseleave', () => {
    carousel.style.animationPlayState = 'running';
});
</script>

</body>
</html>
